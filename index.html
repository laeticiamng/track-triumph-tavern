    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Weekly Music Awards",
      "url": "https://weeklymusicawards.com",
      "description": "Concours musical hebdomadaire communautaire avec 12 catégories, votes sur 3 critères et récompenses chaque semaine.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://weeklymusicawards.com/explore?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "C'est vraiment gratuit ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le vote et l'écoute sont 100% gratuits pour tous les membres. Pour soumettre un morceau au concours, un abonnement Pro (à partir de 9,99 €/mois) est nécessaire. Aucun paiement n'influence le classement."
          }
        },
        {
          "@type": "Question",
          "name": "Qui peut participer ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tout artiste ou groupe musical peut s'inscrire. Il suffit de posséder les droits sur le morceau soumis et de respecter le règlement du concours."
          }
        },
        {
          "@type": "Question",
          "name": "Comment les notes sont-elles calculées ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chaque vote évalue trois critères : originalité, production et émotion. La moyenne pondérée des trois donne le score final. Un système anti-fraude IA garantit l'intégrité de chaque vote."
          }
        },
        {
          "@type": "Question",
          "name": "Quelles sont les récompenses ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chaque semaine, une cagnotte sponsorisée récompense les 3 premiers du podium : 200€ pour le 1er, 100€ pour le 2e et 50€ pour le 3e. Les récompenses sont financées par les sponsors, jamais par les participants."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne l'anti-fraude ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Une intelligence artificielle analyse chaque vote en temps réel : détection de comptes suspects, rafales de votes, comportements anormaux. Les votes frauduleux sont automatiquement invalidés."
          }
        },
        {
          "@type": "Question",
          "name": "Puis-je soumettre plusieurs morceaux ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Vous pouvez soumettre un morceau par semaine et par catégorie, garantissant une compétition équitable pour tous les artistes."
          }
        }
      ]
    }
    </script>
