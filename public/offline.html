<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors ligne — Weekly Music Awards</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0b;
      color: #e4e4e7;
      padding: 1.5rem;
      overflow: hidden;
    }

    /* Background ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 140%;
      height: 140%;
      background: radial-gradient(ellipse at 30% 20%, rgba(168, 85, 247, 0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      text-align: center;
      max-width: 400px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* Music note particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .note {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0.08;
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.08; }
      90% { opacity: 0.08; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .icon-wrap {
      width: 96px; height: 96px;
      margin: 0 auto 2rem;
      border-radius: 50%;
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid rgba(168, 85, 247, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2.5s ease-in-out infinite;
      position: relative;
    }
    .icon-wrap::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(168, 85, 247, 0.06);
      animation: ring 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    @keyframes ring {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0; }
    }
    .icon-wrap svg {
      width: 40px; height: 40px;
      stroke: #a855f7;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #a855f7;
      opacity: 0.7;
    }
    .brand svg {
      width: 16px; height: 16px;
      fill: #a855f7;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e4e4e7 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 0.875rem;
      color: #a1a1aa;
      line-height: 1.7;
      margin-bottom: 2rem;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      border: none;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(168, 85, 247, 0.4); }
    .btn-primary:active { transform: scale(0.97) translateY(0); }
    .btn-primary.loading { pointer-events: none; opacity: 0.7; }
    .btn-primary.loading .btn-icon { animation: spin 0.8s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .btn-primary svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      border: 1px solid rgba(161, 161, 170, 0.15);
      background: transparent;
      color: #71717a;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { color: #a1a1aa; border-color: rgba(161, 161, 170, 0.3); }

    .status {
      margin-top: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: #52525b;
      transition: all 0.3s;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 1.5s ease-in-out infinite;
      transition: background 0.3s;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Online state */
    .online .dot { background: #22c55e; animation: none; }
    .online .status { color: #22c55e; }

    .toast {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(-120%);
      padding: 0.75rem 1.25rem;
      border-radius: 0.75rem;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      font-size: 0.8125rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 10;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
  </style>
</head>
<body>
  <!-- Floating music notes -->
  <div class="particles" id="particles"></div>

  <!-- Reconnection toast -->
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
    Connexion rétablie !
  </div>

  <div class="card">
    <div class="brand">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3" /><circle cx="18" cy="16" r="3" /></svg>
      Weekly Music Awards
    </div>

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>

    <h1>Vous êtes hors ligne</h1>
    <p>Pas de connexion internet. Vérifiez votre réseau Wi-Fi ou données mobiles, puis réessayez.</p>

    <div class="actions">
      <button class="btn-primary" id="retryBtn" onclick="handleRetry()">
        <svg class="btn-icon" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10" /><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" /></svg>
        Réessayer
      </button>
      <button class="btn-secondary" onclick="history.back()">
        ← Retour
      </button>
    </div>

    <div class="status" id="status">
      <span class="dot"></span>
      <span id="statusText">Hors ligne</span>
    </div>
  </div>

  <script>
    // Floating music notes
    const notes = ['♪', '♫', '♩', '♬', '🎵'];
    const container = document.getElementById('particles');
    for (let i = 0; i < 8; i++) {
      const el = document.createElement('span');
      el.className = 'note';
      el.textContent = notes[i % notes.length];
      el.style.left = (Math.random() * 100) + '%';
      el.style.animationDuration = (12 + Math.random() * 10) + 's';
      el.style.animationDelay = (Math.random() * 8) + 's';
      container.appendChild(el);
    }

    // Retry with loading state
    function handleRetry() {
      const btn = document.getElementById('retryBtn');
      btn.classList.add('loading');
      btn.querySelector('.btn-icon').style.animation = 'spin 0.8s linear infinite';
      setTimeout(() => {
        if (navigator.onLine) {
          window.location.reload();
        } else {
          btn.classList.remove('loading');
          btn.querySelector('.btn-icon').style.animation = '';
        }
      }, 800);
    }

    // Auto-detect reconnection
    window.addEventListener('online', () => {
      document.body.classList.add('online');
      document.getElementById('statusText').textContent = 'Connexion rétablie';
      document.getElementById('toast').classList.add('show');
      setTimeout(() => window.location.reload(), 1500);
    });
  </script>
</body>
</html>
